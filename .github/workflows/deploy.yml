name: Deploy to Droplet

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 167.99.184.49
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: /opt/deploy-pontera.sh
